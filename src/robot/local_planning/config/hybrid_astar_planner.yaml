state_manager_node:
  ros__parameters:
    state_update_rate: 50.0 # hz the state machine runs grid scan, and state transitions
    planning_trigger_rate: 50.0 # hz the planner runs
    overtake_start_distance_m: 3.0 # distance from opponent to start overtake
    side_by_side_distance_m: 0.5 # within 0.5m of the back of the opponent
    merge_start_gap_m: 1.0 # distance from opponent to start merge
    merge_done_gap_m: 2.0 # distance from opponent to end merge
    merge_done_d_m: 0.25 # d-offset to end merge (as defined in frenet frame)

hybrid_astar_planner_node:
  ros__parameters:
    horizon_m: 6.0 # length of the path
    layer_spacing_m: 0.5
    lane_spacing_m: 0.1
    max_lateral_offset_m: 1.8
    max_lane_jump_per_layer: 3
    max_path_angle_deg: 50.0 # max heading deviation from raceline for sampled edge geometry
    sample_spacing_m: 0.1 #basically the resolution of the path
    max_runtime_ms: 50.0
    heuristic_weight: 1.0
    heading_buckets_deg: [-10.0, -5.0, 0.0, 5.0, 10.0]
    max_heading_jump_per_layer: 1
    max_heading_mismatch_deg: 25.0
    heuristic_sample_count: 8
    collision_circle_radius_m: 0.20
    front_collision_circle_offset_m: 0.26
    soft_inflation_distance_m: 0.18
    soft_inflation_cost: 100.0
    occupied_threshold: 50
    friction_coeff: 1.0 #yeah this number is completely made up
    min_velocity_mps: 0.5 # ill probably make this 0 at some point
    max_velocity_mps: 10.0 # the dream i guess
    time_weight: 1.0 # how much we value optimizing time
    curvature_change_weight: 0.4 # how much we value physics
    follow_d_weight: 0.20 # pull towards racing line in follow mode
    overtake_d_weight: 0.02 # pull towards racing line in overtake mode
    merge_d_weight: 0.20 # pull towards racing line in merge mode
    merge_terminal_d_weight: 0.0 # punish merge paths that dont return to racing line
    default_intent: 0
    planner_runtime_budget_ms: 100.0


# max_path_angle_deg replaces the old lane-jump cap with a geometry constraint on edge slope
