occupancy_grid_generator:
  ros__parameters:
    # Grid dimensions and resolution
    grid_width: 20.0        # meters
    grid_height: 20.0       # meters
    resolution: 0.1         # meters per cell

    # Frame IDs
    robot_frame: "roboracer_1"

    # Topic names
    scan_topic: "/autodrive/roboracer_1/lidar"
    output_topic: "/costmap"

    # Obstacle marking
    obstacle_value: 100     # value for occupied cells (0-100)
    free_value: 0           # value for free cells (0-100)
    unknown_value: -1       # value for unknown cells
