services:
  robot: 
    build: &robot_build
      context: ..
      dockerfile: docker/robot/robot.Dockerfile
      cache_from:
        - "${ROBOT_IMAGE:?}:${TAG}"
        - "${ROBOT_IMAGE:?}:main"
      args:
        BASE_IMAGE: ${BASE_IMAGE_OVERRIDE-}
    image: "${ROBOT_IMAGE:?}:${TAG}"
    profiles:
      - deploy
    command: /bin/bash -c "ros2 launch bringup_robot robot.launch.py"
  
  robot_dev:
    build: *robot_build
    image: "${ROBOT_IMAGE:?}:dev_${TAG}"
    command: tail -F anything
    privileged: true
    profiles:
      - develop
    volumes:
      - ${MONO_DIR}/src:/home/bolty/ament_ws/src
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
    device_cgroup_rules:
      - 'c 13:* rmw' 
      - 'c 188:0 rmw'
      - 'c 166:* rmw'
      - 'c 10:229 rmw'  # /dev/uhid for Bluetooth HID emulation

